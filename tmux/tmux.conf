# Gruvbox color palette for tmux
# ── Accent colors ─────────────────────────────────────────────
set -g @red          "#cc241d"
set -g @red_bright   "#fb4934"

set -g @green        "#98971a"
set -g @green_bright "#b8bb26"

set -g @yellow        "#d79921"
set -g @yellow_bright "#fabd2f"

set -g @blue        "#458588"
set -g @blue_bright "#83a598"

set -g @purple        "#b16286"
set -g @purple_bright "#d3869b"

set -g @aqua        "#689d6a"
set -g @aqua_bright "#8ec07c"

set -g @orange        "#d65d0e"
set -g @orange_bright "#fe8019"

set -g @gray        "#a89984"
set -g @gray_bright "#928374"

# ── Background ramp ───────────────────────────────────────────
set -g @bg0_h "#1d2021"   # hard dark
set -g @bg0_s "#32302f"   # soft dark
set -g @bg0   "#282828"   # default bg
set -g @bg1   "#3c3836"   # status bar bg
set -g @bg2   "#504945"   # inactive pane border
set -g @bg3   "#665c54"   # comment / muted
set -g @bg4   "#7c6f64"   # selection bg

# ── Foreground ramp ───────────────────────────────────────────
set -g @fg0 "#fbf1c7"   # brightest fg
set -g @fg  "#ebdbb2"   # default fg  (alias for fg1)
set -g @fg1 "#ebdbb2"
set -g @fg2 "#d5c4a1"
set -g @fg3 "#bdae93"
set -g @fg4 "#a89984"   # dimmed fg / active border
# Gruvbox color palette for tmux

set-environment -g PATH "/usr/local/bin:/bin:/usr/bin:/usr/sbin:/opt/homebrew/bin"

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse
set -g mouse on

# Highlight the current window
setw -g window-status-current-style bg=colour0,fg=colour11,dim

# Reload config file
bind r source-file ~/.tmux.conf

# Key bindings
# Select pane
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Swap panes
bind -r U swap-pane -U
bind -r D swap-pane -D


set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g status-right-style "none"
set -g status-position "bottom"

# gruvbox
set -g status-style "none,bg=#{@bg1}"
set -g pane-border-style "fg=#{@bg2}"
set -g pane-active-border-style "fg=#{@purple_bright}"
set -g status-left "#[fg=#{@bg0_h},bg=#{@gray}] #S #[fg=#{@gray},bg=#{@bg1},nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#{@gray},bg=#{@bg2}] An.Minh #[fg=#{@bg1},bg=#{@bg1},nobold,nounderscore,noitalics]#[fg=#{@gray},bg=#{@bg1}] %a #[fg=#{@bg2},bg=#{@bg1},nobold,nounderscore,noitalics]#[fg=#{@gray},bg=#{@bg2}] %Y-%m-%d %H:%M #[fg=#{@orange_bright},bg=#{@bg1}]#{cpu_icon}#{cpu_percentage} #{ram_icon}#{ram_percentage}"
setw -g window-status-style "none,fg=#{@gray},bg=#{@bg1}"
setw -g window-status-format "#[fg=#{@bg1},bg=#{@bg1},nobold,nounderscore,noitalics]#[default] #I #[fg=#{@bg1},bg=#{@bg1},nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#{@bg1},bg=#{@bg2},nobold,nounderscore,noitalics]#[fg=#{@gray},bg=#{@bg2}] #I #[fg=#{@bg2},bg=#{@bg1},nobold,nounderscore,noitalics]"
setw -g window-status-activity-style "underscore,fg=#{@gray},bg=#{@bg1}"
set -g message-style "fg=#{@gray},bg=#{@bg2}"
set -g message-command-style "fg=#{@gray},bg=#{@bg2}"

set -g status-right-length "100"
set -g status-left-length "100"

setw -g window-status-separator ""

set -g pane-border-status off

set -sg escape-time 10

set -g focus-events on

set -g default-shell /opt/homebrew/bin/fish
set -g default-command /opt/homebrew/bin/fish

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Use Vi mode
set-window-option -g mode-keys vi

set-option -s set-clipboard off
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X rectangle-toggle
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

# Tmux session manager
bind-key f display-popup -E -w 60% -h 60% "~/.tmux-session-manager.sh"

# Forward extended key sequences (e.g. Shift+Enter) to applications
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Explicitly send Shift+Enter as CSI u sequence for apps like Claude Code
bind-key -n S-Enter send-keys Escape "[13;2u"

# Term colors
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-ghostty:RGB"

# Plugins
run-shell ~/tmux-plugins/tmux-cpu/cpu.tmux
